<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Animal 2048 - Mobile Edition</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --score-bg: #8f7a66;
            --grid-bg: rgba(187, 173, 160, 0.5); /* Sfondo griglia trasparente per lo sfondo */
        }
        
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: var(--bg-color);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* Impedisce lo scroll di sistema mentre si gioca */
            touch-action: none;
            overflow: hidden;
        }

        .game-header {
            text-align: center;
            margin-bottom: 5vh; /* Distanza in percentuale dell'altezza della visuale */
            z-index: 10;
        }

        h1 { margin: 0; font-size: 8vw; font-weight: bold; }

        .score-container {
            background: var(--score-bg);
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 5vw;
            font-weight: bold;
            display: inline-block;
            margin-top: 5px;
        }

        canvas {
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            /* Dimensioni responsive per mobile (sempre quadrato) */
            width: 90vw; 
            height: 90vw;
            max-width: 500px;
            max-height: 500px;
            cursor: pointer;
        }

        .controls { margin-top: 3vh; z-index: 10; }
        button {
            background: #e67e22;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 4vw;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #d35400; }

    </style>
</head>
<body>

    <div class="game-header">
        <h1>Animal 2048</h1>
        <div class="score-container">Punti: <span id="scoreVal">0</span></div>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <div class="controls">
        <button onclick="init()">Riavvia Gioco</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreVal');

        // --- 1. CONFIGURAZIONE ASSET (URL GitHub) ---
        const GITHUB_BASE = "https://zombiemayem-del.github.io/testHTML/assets/";
        const SPRITE_URL = GITHUB_BASE + "sprite_sheet.png?v=3";
        const BG_URL = GITHUB_BASE + "background.png?v=2";
        
        const spriteSheet = new Image();
        spriteSheet.crossOrigin = "anonymous";
        const bgImage = new Image();
        bgImage.crossOrigin = "anonymous";

        let loadedCount = 0;
        const totalToLoad = 2;

        // --- 2. PARAMETRI DI CALIBRAZIONE PER EVITARE TAGLI ---
        // cols/rows nello sprite sheet. offsetX/offsetY sono stati impostati a 0 e lo zoom a 0.7 per un centramento pulito.
        const CALIBRATION = {
            cols: 4, rows: 3,
            offsetX: 0, offsetY: 0,
            animalZoom: 0.75  // 0.7 = L'animale è il 70% della dimensione della casella, perfetto per centrarlo
        };

        const GRID_SIZE = 4;
        const TILE_MARGIN = 12;
        const TILE_SIZE = (canvas.width - (TILE_MARGIN * (GRID_SIZE + 1))) / GRID_SIZE;

        const tileToAnimalIndex = {
            2: 0, 4: 1, 8: 2, 16: 3, 32: 4, 64: 5, 
            128: 6, 256: 7, 512: 8, 1024: 9, 2048: 10
        };

        let grid = [];
        let score = 0;

        // --- GESTIONE CARICAMENTO ASSET ---

        function checkAssetsLoaded() {
            loadedCount++;
            if (loadedCount === totalToLoad) { init(); }
        }

        spriteSheet.onload = checkAssetsLoaded;
        bgImage.onload = checkAssetsLoaded;
        spriteSheet.onerror = () => alert("Errore: Impossibile caricare sprite_sheet.png.");
        bgImage.onerror = () => alert("Errore: Impossibile caricare background.png.");

        // AVVIA CARICAMENTO
        spriteSheet.src = SPRITE_URL;
        bgImage.src = BG_URL;


        // --- 3. LOGICA DI GIOCO ---

        function init() {
            grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
            score = 0;
            addRandomTile();
            addRandomTile();
            draw();
        }

        function addRandomTile() {
            let emptyCells = [];
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    if(grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if(emptyCells.length > 0) {
                let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // --- 4. MOTORE GRAFICO (Ritaglio pulito e responsive) ---

        function draw() {
            // Sfondo
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            scoreDisplay.innerText = score;

            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    let x = TILE_MARGIN + c * (TILE_SIZE + TILE_MARGIN);
                    let y = TILE_MARGIN + r * (TILE_SIZE + TILE_MARGIN);

                    // Sfondo cella vuota (reso trasparente nel CSS)
                    ctx.fillStyle = "rgba(238, 228, 218, 0.35)";
                    ctx.beginPath();
                    ctx.roundRect(x, y, TILE_SIZE, TILE_SIZE, 8);
                    ctx.fill();

                    if(grid[r][c] !== 0) {
                        drawAnimalCentered(grid[r][c], x, y);
                    }
                }
            }
        }

        // NUOVA FUNZIONE: Ritaglia l'animale intero e lo scala per centrarlo
        function drawAnimalCentered(value, destX, destY) {
            const index = tileToAnimalIndex[value];
            if (index === undefined) return;

            const col = index % CALIBRATION.cols;
            const row = Math.floor(index / CALIBRATION.cols);

            // Dimensioni ritaglio da sorgente (intere, senza zoom)
            const sw = spriteSheet.width / CALIBRATION.cols;
            const sh = spriteSheet.height / CALIBRATION.rows;

            const sx = col * sw + CALIBRATION.offsetX;
            const sy = row * sh + CALIBRATION.offsetY;

            // Applichiamo lo zoom sulla destinazione per centrarlo
            //sw * CALIBRATION.zoom, sh * CALIBRATION.zoom

            // Calcolo corretto del padding per non ritagliare eccessivamente e centrare
            const padding = (TILE_SIZE * (1 - CALIBRATION.animalZoom)) / 2;
            const drawSize = TILE_SIZE * CALIBRATION.animalZoom;

            ctx.drawImage(
                spriteSheet,
                sx, sy, sw * CALIBRATION.animalZoom, sh * CALIBRATION.animalZoom, // Sorgente
                destX + padding, destY + padding, drawSize, drawSize // Destinazione (scalata e centrata)
            );
        }

        // --- 5. MOVIMENTI ---

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = GRID_SIZE - arr.length;
            return arr.concat(new Array(missing).fill(0));
        }

        function combine(row) {
            for (let i = 0; i < GRID_SIZE - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                }
            }
            return row;
        }

        function operate(row) {
            row = slide(row);
            row = combine(row);
            row = slide(row);
            return row;
        }

        function rotateGrid(matrix) {
            return matrix[0].map((_, colIndex) => matrix.map(row => row[colIndex]).reverse());
        }

        function updateGrid(direction) {
            let oldGrid = JSON.stringify(grid);

            if (direction === "left") { grid = grid.map(row => operate(row)); } 
            else if (direction === "right") { grid = grid.map(row => operate(row.reverse()).reverse()); } 
            else if (direction === "up") { grid = rotateGrid(rotateGrid(rotateGrid(grid))); grid = grid.map(row => operate(row)); grid = rotateGrid(grid); } 
            else if (direction === "down") { grid = rotateGrid(grid); grid = grid.map(row => operate(row)); grid = rotateGrid(rotateGrid(rotateGrid(grid))); }

            if (oldGrid !== JSON.stringify(grid)) {
                addRandomTile();
                draw();
            }
        }

        // --- 6. GESTIONE INPUT (Tastiera + Swipe Touch) ---

        // Tastiera
        window.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") updateGrid("left");
            else if (e.key === "ArrowRight") updateGrid("right");
            else if (e.key === "ArrowUp") updateGrid("up");
            else if (e.key === "ArrowDown") updateGrid("down");
        });

        // NUOVO: Gestione Swipe Touch per mobile
        let touchStartX, touchStartY;
        const SWIPE_THRESHOLD = 30; // Distanza minima in pixel per registrare uno swipe

        window.addEventListener('touchstart', (e) => {
            e.preventDefault(); // Impedisce lo scroll della pagina
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false }); // FONDAMENTALE: passive false permette preventDefault

        window.addEventListener('touchend', (e) => {
            e.preventDefault();
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;

            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;

            // Determina la direzione dello swipe
            if (Math.abs(diffX) > Math.abs(diffY)) {
                // Swipe Orizzontale
                if (Math.abs(diffX) > SWIPE_THRESHOLD) {
                    if (diffX > 0) updateGrid("right");
                    else updateGrid("left");
                }
            } else {
                // Swipe Verticale
                if (Math.abs(diffY) > SWIPE_THRESHOLD) {
                    if (diffY > 0) updateGrid("down");
                    else updateGrid("up");
                }
            }
        }, { passive: false });

    </script>
</body>
</html>
