<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Animal 2048 Pro</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --grid-bg: rgba(187, 173, 160, 0.5); /* Reso leggermente trasparente per far vedere lo sfondo sotto */
            --cell-bg: rgba(238, 228, 218, 0.35);
        }
        body {
            margin: 0;
            background: var(--bg-color);
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            touch-action: none;
        }
        .header { text-align: center; margin-bottom: 10px; z-index: 10; }
        .score-container {
            background: #8f7a66;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 24px;
            font-weight: bold;
            margin-top: 5px;
        }
        canvas {
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
            max-width: 95vw;
            max-height: 70vh;
            cursor: pointer;
        }
        .controls { margin-top: 15px; z-index: 10; }
        button {
            background: #e67e22;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #d35400; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0">Animal 2048</h1>
        <div class="score-container">Punti: <span id="scoreVal">0</span></div>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <div class="controls">
        <button onclick="init()">Riavvia Gioco</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('scoreVal');

        // --- 1. CONFIGURAZIONE ASSET ---
        const GITHUB_BASE = "https://zombiemayem-del.github.io/testHTML/assets/";
        const SPRITE_URL = GITHUB_BASE + "sprite_sheet.png?v=2";
        const BG_URL = GITHUB_BASE + "background.png?v=1"; // NUOVO: URL dello sfondo
        
        let loadedCount = 0;
        const totalToLoad = 2; // Sprite + Sfondo

        const spriteSheet = new Image();
        spriteSheet.crossOrigin = "anonymous";
        // Non impostiamo .src qui, lo facciamo alla fine dopo aver impostato gli onload

        const bgImage = new Image(); // NUOVO: Oggetto per l'immagine di sfondo
        bgImage.crossOrigin = "anonymous";
        // Non impostiamo .src qui

        // --- 2. PARAMETRI DI CALIBRAZIONE ---
        const CALIBRATION = {
            cols: 4, rows: 3,
            offsetX: 15, offsetY: -5,
            zoom: 0.85
        };

        const GRID_SIZE = 4;
        const TILE_MARGIN = 12;
        const TILE_SIZE = (canvas.width - (TILE_MARGIN * (GRID_SIZE + 1))) / GRID_SIZE;

        const tileToAnimalIndex = {
            2: 0, 4: 1, 8: 2, 16: 3, 32: 4, 64: 5, 
            128: 6, 256: 7, 512: 8, 1024: 9, 2048: 10
        };

        let grid = [];
        let score = 0;

        // --- 3. GESTIONE CARICAMENTO ASSET ---

        function checkAssetsLoaded() {
            loadedCount++;
            if (loadedCount === totalToLoad) {
                console.log("Tutti gli asset caricati correttamente!");
                init(); // Avvia il gioco solo quando TUTTO è pronto
            }
        }

        spriteSheet.onload = checkAssetsLoaded;
        bgImage.onload = checkAssetsLoaded;

        spriteSheet.onerror = () => alert("Errore: Impossibile caricare sprite_sheet.png da GitHub.");
        bgImage.onerror = () => alert("Errore: Impossibile caricare background.png da GitHub.");

        // AVVIA IL CARICAMENTO
        spriteSheet.src = SPRITE_URL;
        bgImage.src = BG_URL;


        // --- 4. LOGICA DI GIOCO ---

        function init() {
            grid = Array.from({ length: GRID_SIZE }, () => Array(GRID_SIZE).fill(0));
            score = 0;
            addRandomTile();
            addRandomTile();
            draw();
        }

        function addRandomTile() {
            let emptyCells = [];
            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    if(grid[r][c] === 0) emptyCells.push({r, c});
                }
            }
            if(emptyCells.length > 0) {
                let cell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        // --- 5. MOTORE GRAFICO ---

        function draw() {
            // --- NUOVO: Disegna lo Sfondo PRIMA di tutto il resto ---
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

            // ctx.clearRect(0, 0, canvas.width, canvas.height); // Non più necessario se disegniamo lo sfondo sopra
            scoreDisplay.innerText = score;

            for(let r=0; r<GRID_SIZE; r++) {
                for(let c=0; c<GRID_SIZE; c++) {
                    let x = TILE_MARGIN + c * (TILE_SIZE + TILE_MARGIN);
                    let y = TILE_MARGIN + r * (TILE_SIZE + TILE_MARGIN);

                    // Disegna sfondo cella vuota (reso trasparente nel CSS per far vedere lo sfondo)
                    ctx.fillStyle = "rgba(238, 228, 218, 0.35)";
                    ctx.beginPath();
                    ctx.roundRect(x, y, TILE_SIZE, TILE_SIZE, 8);
                    ctx.fill();

                    if(grid[r][c] !== 0) {
                        drawAnimal(grid[r][c], x, y);
                    }
                }
            }
        }

        function drawAnimal(value, destX, destY) {
            const index = tileToAnimalIndex[value];
            if (index === undefined) return;

            const col = index % CALIBRATION.cols;
            const row = Math.floor(index / CALIBRATION.cols);

            const sw = spriteSheet.width / CALIBRATION.cols;
            const sh = spriteSheet.height / CALIBRATION.rows;

            const sx = col * sw + CALIBRATION.offsetX;
            const sy = row * sh + CALIBRATION.offsetY;

            const padding = (TILE_SIZE * (1 - CALIBRATION.zoom)) / 2;
            const drawSize = TILE_SIZE * CALIBRATION.zoom;

            ctx.drawImage(
                spriteSheet,
                sx, sy, sw * CALIBRATION.zoom, sh * CALIBRATION.zoom, // Sorgente
                destX + padding, destY + padding, drawSize, drawSize // Destinazione
            );
        }

        // --- 6. MOVIMENTI E INPUT ---

        function slide(row) {
            let arr = row.filter(val => val);
            let missing = GRID_SIZE - arr.length;
            return arr.concat(new Array(missing).fill(0));
        }

        function combine(row) {
            for (let i = 0; i < GRID_SIZE - 1; i++) {
                if (row[i] !== 0 && row[i] === row[i + 1]) {
                    row[i] *= 2;
                    score += row[i];
                    row[i + 1] = 0;
                }
            }
            return row;
        }

        function operate(row) {
            row = slide(row);
            row = combine(row);
            row = slide(row);
            return row;
        }

        function rotateGrid(matrix) {
            return matrix[0].map((_, colIndex) => matrix.map(row => row[colIndex]).reverse());
        }

        window.addEventListener('keydown', (e) => {
            let oldGrid = JSON.stringify(grid);
            
            if (e.key === "ArrowLeft") {
                grid = grid.map(row => operate(row));
            } else if (e.key === "ArrowRight") {
                grid = grid.map(row => operate(row.reverse()).reverse());
            } else if (e.key === "ArrowUp") {
                grid = rotateGrid(rotateGrid(rotateGrid(grid)));
                grid = grid.map(row => operate(row));
                grid = rotateGrid(grid);
            } else if (e.key === "ArrowDown") {
                grid = rotateGrid(grid);
                grid = grid.map(row => operate(row));
                grid = rotateGrid(rotateGrid(rotateGrid(grid)));
            }

            if (oldGrid !== JSON.stringify(grid)) {
                addRandomTile();
                draw();
            }
        });

    </script>
</body>
</html>
